<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - NASAD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="checkStatus()">
    <div id="loginBox" class="container">
        <h1>Staff Login</h1>
        <input type="text" id="user" placeholder="User">
        <input type="password" id="pass" placeholder="Pass">
        <button onclick="login()">Login</button>
    </div>

    <div id="adminPanel" class="container admin-wide" style="display:none;">
        <h1>Active Orders</h1>
        <div id="activeOrders"></div>

        <hr>
        <h2>Inventory Management</h2>
        <input type="text" id="itemName" placeholder="Item Name">
        <input type="number" id="itemPrice" placeholder="Price">
        <input type="number" id="itemStock" placeholder="Stock">
        <button onclick="updateStock()">Update / Add Item</button>
        <div id="inventoryList" style="margin-top:20px;"></div>

        <hr>
        <h2>Completed Orders</h2>
        <div id="completedOrders" style="opacity:0.6;"></div>
    </div>

    <script>
        const API_URL = "https://api.underhost.org";
        let auth = {};

        async function login() {
            auth = { user: document.getElementById('user').value, pass: document.getElementById('pass').value };
            const res = await fetch(`${API_URL}/admin/data`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(auth)
            });
            if (res.ok) {
                document.getElementById('loginBox').style.display = "none";
                document.getElementById('adminPanel').style.display = "block";
                render(await res.json());
            } else { alert("Wrong credentials"); }
        }

        function render(data) {
            document.getElementById('activeOrders').innerHTML = data.orders.map((o, i) => `
                <div class="order-card" style="display:flex; justify-content:space-between;">
                    <div><strong>${o.name}</strong> (${o.location})<br>${o.item}<br>Total: ${o.total} AED</div>
                    <button onclick="complete(${i})" style="width:auto; background:#4ade80;">Complete</button>
                </div>
            `).reverse().join('');

            document.getElementById('inventoryList').innerHTML = data.inventory.map(i => `
                <div class="order-card" style="display:flex; justify-content:space-between;">
                    <div>${i.name} - ${i.price} AED (Stock: ${i.stock})</div>
                    <button onclick="fill('${i.name}', ${i.price}, ${i.stock})" style="width:auto;">Edit</button>
                </div>
            `).join('');

            document.getElementById('completedOrders').innerHTML = data.completed_orders.map(o => `
                <div>${o.name} bought ${o.item} - ${o.total} AED</div>
            `).reverse().join('');
        }

        function fill(n, p, s) {
            document.getElementById('itemName').value = n;
            document.getElementById('itemPrice').value = p;
            document.getElementById('itemStock').value = s;
        }

        async function updateStock() {
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;
            const stock = document.getElementById('itemStock').value;
            await fetch(`${API_URL}/admin/update_stock`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ...auth, name, price, stock })
            });
            location.reload();
        }

        async function complete(idx) {
            await fetch(`${API_URL}/admin/complete_order`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ...auth, index: idx })
            });
            location.reload();
        }
    </script>
</body>
</html>
