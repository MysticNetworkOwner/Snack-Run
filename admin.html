<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Portal - NASAD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Form (Shown by default) -->
    <div id="loginSection" class="container">
        <h1>Admin Login</h1>
        <p>Enter staff credentials</p>
        <input type="text" id="userField" placeholder="Username">
        <input type="password" id="passField" placeholder="Password">
        <button onclick="attemptLogin()">Login</button>
        <button class="secondary-btn" onclick="window.location.href='index.html'">Back to Shop</button>
    </div>

    <!-- Dashboard (Hidden until login) -->
    <div id="adminPanel" style="display:none;" class="container admin-wide">
        <h1>NASAD Management</h1>
        
        <div class="section">
            <h2>Active Orders</h2>
            <div id="orderLog">Loading orders...</div>
        </div>

        <hr>

        <div class="section">
            <h2>Manage Stock</h2>
            <input type="text" id="itemName" placeholder="Item Name">
            <input type="number" id="itemStock" placeholder="Quantity">
            <button onclick="updateInventory()">Update Stock</button>
            <div id="currentInvDisplay" style="margin-top:15px; color: #848e9c;"></div>
        </div>
        
        <button class="secondary-btn" onclick="logout()">Logout</button>
    </div>

    <script>
        const API_URL = "https://api.underhost.org";
        let auth = {};

        async function attemptLogin() {
            const u = document.getElementById('userField').value;
            const p = document.getElementById('passField').value;
            auth = { user: u, pass: p };

            try {
                const res = await fetch(`${API_URL}/admin/data`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(auth)
                });

                if (res.ok) {
                    const data = await res.json();
                    // Hide login, show dashboard
                    document.getElementById('loginSection').style.display = "none";
                    document.getElementById('adminPanel').style.display = "block";
                    renderAdmin(data);
                } else {
                    alert("Invalid Username or Password");
                }
            } catch (e) {
                alert("Error: Cannot reach backend.");
            }
        }

        function renderAdmin(data) {
            const log = document.getElementById('orderLog');
            log.innerHTML = data.orders.length ? data.orders.map(o => `
                <div class="order-card">
                    <strong>${o.name}</strong> wants <strong>${o.item}</strong><br>
                    <small>📍 ${o.location} | 💬 ${o.contact}</small>
                </div>
            `).sort().reverse().join('') : "No orders yet.";

            const inv = document.getElementById('currentInvDisplay');
            inv.innerHTML = "Current Stock: " + 
                (data.inventory.length ? data.inventory.map(i => `${i.name} (${i.stock})`).join(' | ') : "Empty");
        }

        async function updateInventory() {
            const name = document.getElementById('itemName').value;
            const stock = parseInt(document.getElementById('itemStock').value);
            
            const res = await fetch(`${API_URL}/admin/update_stock`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...auth, name, stock })
            });

            if (res.ok) {
                alert("Stock Updated!");
                // Refresh data without full page reload
                const refresh = await fetch(`${API_URL}/admin/data`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(auth)
                });
                renderAdmin(await refresh.json());
            }
        }

        function logout() {
            location.reload();
        }
    </script>
</body>
</html>
