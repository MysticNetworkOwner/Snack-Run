<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASAD Snack Run</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🚀 NASAD Snack Run</h1>
        <p>Enter your details to start the run.</p>
        <input type="text" id="name" placeholder="Full Name">
        <input type="text" id="contact" placeholder="Discord Username">
        <input type="text" id="location" placeholder="Current Room / Location">
        <button onclick="saveAndNext()">Start Order</button>
    </div>
    <script>
        function saveAndNext() {
            const user = {
                name: document.getElementById('name').value,
                contact: document.getElementById('contact').value,
                location: document.getElementById('location').value
            };
            if(!user.name || !user.location) return alert("Please fill in your name and location!");
            localStorage.setItem('customer', JSON.stringify(user));
            window.location.href = "orders.html";
        }
    </script>
</body>
</html>
