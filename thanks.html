<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thank You</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="text-align:center;">
        <h1 id="userTitle">Thanks!</h1>
        <p id="subMsg"></p>
        <div style="font-size: 4rem; margin: 20px;">🎒</div>
        <button onclick="window.location.href='index.html'">Finish</button>
    </div>
    <script>
        const c = JSON.parse(localStorage.getItem('customer'));
        const t = localStorage.getItem('lastTotal');
        document.getElementById('userTitle').innerText = `Thanks, ${c.name}!`;
        document.getElementById('subMsg').innerHTML = `Please meet us at <b>${c.location}</b> at lunch time and bring <b>${t} AED</b>!<br>See you then.`;
    </script>
</body>
</html>
